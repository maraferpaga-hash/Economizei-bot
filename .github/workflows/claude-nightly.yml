name: Maquina Noturna (Claude · codigo)

# ─────────────────────────────────────────────────────────────────────────────
# A "maquina que trabalha sozinha". Le a AGENDA.md, pega a proxima tarefa pronta,
# IMPLEMENTA no codigo (com testes) numa branch isolada e abre um Pull Request em
# RASCUNHO. Nada entra na main sem o Gabriel revisar.
#
# BLINDAGEM FINANCEIRA: a maquina NUNCA mexe em pagamento/cobranca. Garantido por
# scripts/check-firewall.mjs (roda no CI e reprova o PR que tocar dinheiro) +
# branch protection.
# ─────────────────────────────────────────────────────────────────────────────

on:
  # CRON DESLIGADO durante a validacao, pra nao disparar sozinho as 5h e gastar
  # cota antes de confirmarmos que sai PR. Rode na mao por: Actions -> Run workflow.
  # Quando um run manual entregar um PR bom, descomente as 2 linhas abaixo:
  # schedule:
  #   - cron: "0 8 * * *"   # 08:00 UTC = 05:00 BRT (Brasil e UTC-3 o ano todo)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # exigido pela claude-code-action (token OIDC)

concurrency:
  group: maquina-noturna
  cancel-in-progress: false

jobs:
  executar-tarefa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historico completo (firewall compara o diff com a main)

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Rodar a tarefa da noite
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }} # pra o agente conseguir abrir o PR via `gh pr create`
        with:
          # AUTENTICACAO: usa a assinatura Claude Pro/Max via OAuth token
          # (`claude setup-token` -> secret abaixo). Sem comprar API a parte.
          # Alternativa API: troque por  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # bypassPermissions: roda sem pedir aprovacao humana (este runner e
          # isolado e descartavel). Sem isto, a action NEGA git/gh/node e a run
          # gasta turns a toa sem abrir PR. --max-turns 20 limita o custo.
          claude_args: "--model claude-sonnet-4-6 --max-turns 20 --permission-mode bypassPermissions"
          prompt: |
            Voce e o engenheiro noturno do Economizei. Entregue UMA tarefa da
            AGENDA.md como Pull Request em RASCUNHO, com testes. Seja direto e
            economico em passos.

            PASSO A PASSO:
            1) Leia a AGENDA.md. Na secao "## 🌙 Fila pronta", pegue a PRIMEIRA
               tarefa com "status: pronta" que ainda nao tenha branch
               "claude/<id>-..." nem PR. Se nao houver, ENCERRE sem fazer nada.
            2) Crie a branch:  git checkout -b claude/<id>-<resumo-kebab>
            3) Implemente SO o que objetivo/arquivos-alvo/criterios-de-aceite
               pedem; respeite "fora-de-escopo". Padrao do projeto: logica pura em
               src/insights.js separada de I/O; portugues nos nomes e mensagens.
               Toda logica nova vem com teste em test/<nome>.test.js (modelo:
               test/insights.test.js, runner node:test).
            4) Deixe verde, nesta ordem:
                 node scripts/check-firewall.mjs
                 node --check <cada .js que voce mexeu>
                 node --test test/*.test.js
            5) Na AGENDA.md, mova o bloco da tarefa de "## 🌙 Fila pronta" para
               "## 🔧 Em revisão" (troque para "status: em-revisao" + data).
            6) Suba e abra o PR rascunho:
                 git add -A
                 git commit -m "[maquina] <id>: <objetivo curto>"
                 git push -u origin claude/<id>-<resumo-kebab>
                 gh pr create --draft --title "[maquina] <id> — <objetivo>" \
                   --body "O que fez; arquivos mudados; como testar; resultado dos checks."

            ZONA PROIBIDA (NUNCA toque — o CI tem firewall que REPROVA o PR):
            src/mercadopago.js; qualquer linha de pagamento/cobranca (assinatura,
            is_pro, preapproval, MP_, /assinar, /pix, /cancelar, checkout, paywall,
            preco de plano, montarMensagemPlanos, features_pro_ate, ativar-pro);
            supabase/; .env*; .github/; package.json; package-lock.json;
            Dockerfile; Procfile; scripts/check-firewall.mjs.
            Se a tarefa exigir algo disso, NAO faca: marque a tarefa como
            "bloqueada-humano" na AGENDA e abra o PR so com essa nota.

            Uma tarefa, PR pequeno e legivel. Nao decida produto/UX/preco — anote
            no PR pro Gabriel decidir.
